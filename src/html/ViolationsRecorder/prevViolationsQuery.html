<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>
  <!-- <link rel="stylesheet" href="/Style Library/MiningViolations/CSS/main.css" /> -->
</head>

<body>
  <div class="ViolationsLog" id="ViolationsLog">
    <div id="identify" page-name="prevViolationsQueryLog" site-name="ViolationsRecorder" hidden></div>

    <div class="mainContainer">
      <div class="contentContainer">

        <!-- FILTER -->
        <div class="filterBox blueFilterBox">
          <div class="row">

            <!-- Sector -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violationSector" class="customLabel blueLabel">
                  القطاع
                </label>

                <div class="selectBox smallSelectBox">
                  <select class="form-control violationSector blueSelect" id="violationSector">
                    <option value="0" disabled selected hidden>الكل</option>
                  </select>
                  <i class="fa-solid fa-sort-down"></i>
                </div>
              </div>
            </div>

            <!-- Violation Category -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violationCategory" class="customLabel blueLabel">
                  تصنيف المخالفة
                </label>

                <div class="selectBox smallSelectBox">
                  <select class="form-control violationCategory" id="violationCategory">
                    <option value="" disabled selected hidden>الكل</option>
                  </select>
                  <i class="fa-solid fa-sort-down"></i>
                </div>
              </div>
            </div>

            <!-- Violation Type -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="TypeofViolation" class="customLabel blueLabel">
                  نوع المخالفة
                </label>

                <div class="selectBox smallSelectBox">
                  <select class="form-control TypeofViolation blueSelect" id="TypeofViolation">
                    <option data-id="0" value="0" disabled selected hidden>
                      الكل
                    </option>
                  </select>
                  <i class="fa-solid fa-sort-down"></i>
                </div>
              </div>
            </div>

            <!-- Status -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="ViolationStatus" class="customLabel blueLabel">
                  حالة المخالفة
                </label>

                <div class="selectBox smallSelectBox">
                  <select class="form-control ViolationStatus blueSelect" id="ViolationStatus">
                    <option value="" disabled selected hidden>الكل</option>
                  </select>
                  <i class="fa-solid fa-sort-down"></i>
                </div>
              </div>
            </div>

            <!-- Zone -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violationZone" class="customLabel blueLabel">
                  المنطقة
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="violationZone" type="text" class="form-control" placeholder="ادخل المنطقة" />
                </div>
              </div>
            </div>

            <!-- Search -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violationSearch" class="customLabel blueLabel">
                  البحث عن مخالفة
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="violationSearch" type="text" class="form-control" placeholder="البحث" />
                </div>
              </div>
            </div>

            <!-- Violator Name -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violatorName" class="customLabel blueLabel">
                  اسم المخالف
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="violatorName" type="text" class="form-control" placeholder="ادخل اسم المخالف" />
                </div>
              </div>
            </div>

            <!-- National ID -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="nationalID" class="customLabel blueLabel">
                  الرقم القومي للمخالف
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="nationalID" type="text" class="form-control" placeholder="ادخل الرقم القومي" />
                </div>
              </div>
            </div>

            <!-- Violation Code -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="violationCode" class="customLabel blueLabel">
                  رقم المخالفة
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="violationCode" type="text" class="form-control" placeholder="ادخل رقم المخالفة" />
                </div>
              </div>
            </div>

            <!-- Quarry / Car -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="theCode" class="customLabel blueLabel">
                  رقم المحجر \ عربة
                </label>

                <div class="selectBox smallSelectBox">
                  <input id="theCode" type="text" class="form-control" placeholder="ادخل الرقم" />
                </div>
              </div>
            </div>

            <!-- From -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="createdFrom" class="customLabel blueLabel">
                  من
                </label>

                <div class="inputIconBox">
                  <input class="form-control customInput inputDate createdFrom" id="createdFrom" type="text"
                    placeholder="DD-MM-YYYY" />
                  <i class="fa-solid fa-calendar-days"></i>
                </div>
              </div>
            </div>

            <!-- To -->
            <div class="col-6 col-md-3">
              <div class="form-group customFormGroup">
                <label for="createdTo" class="customLabel blueLabel">
                  إلى
                </label>

                <div class="inputIconBox">
                  <input id="createdTo" type="text" class="form-control customInput inputDate createdTo"
                    placeholder="DD-MM-YYYY" />
                  <i class="fa-solid fa-calendar-days"></i>
                </div>
              </div>
            </div>

            <!-- Buttons -->
            <div class="col-6 col-md-1 FilterationBtnsBox">
              <div class="buttonsBox pt-3">

                <div class="btnStyle resetBtn resetBlueBtn">
                  <i class="fa-solid fa-rotate-left"></i>
                </div>

                <div class="btnStyle searchBtn searchBlueBtn">
                  <i class="fa-solid fa-magnifying-glass"></i>
                </div>

                <div class="btnStyle printBtn">
                  طباعة التقرير
                  <i class="fa-solid fa-print"></i>
                </div>

              </div>
            </div>

          </div>
        </div>

        <!-- TABLE -->
        <div class="dashBoardTable">

          <div style="display: flex; justify-content: space-between">

            <!-- Count -->
            <div class="prevVioltionsCountBox bluePrevViolationsBox">
              <span class="prevCountText">
                إجمالي عدد المخالفات السابقة :
              </span>

              (<span class="prevViolationCount">0</span>)
            </div>

            <!-- Buttons -->
            <div style="display:flex; gap:10px;">

              <!-- Column Selector -->
              <div class="columnSelectorWrapper">
                <button type="button" id="columnToggleBtn" class="outlineBlueBtn selectColumnBtn">
                  تحديد الأعمدة
                  <i class="fa-solid fa-grip-lines-vertical"></i>
                </button>

                <div id="columnSelector" class="columnDropdown"></div>
              </div>

              <!-- Export -->
              <div id="exportBtn" class="outlineBlueBtn exportBtn">
                <span class="btn-text">تصدير</span>

                <i class="fa-solid fa-download"></i>

                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"
                  style="display: none;"></span>
              </div>

            </div>

          </div>

          <!-- TABLE -->
          <table id="prevViolationsQueryTable" class="table tableWithIcons blueTable"></table>

        </div>

        <!-- PAGINATION -->
        <div id="paginationID" class="paginationBox" current="" total="" style="display: flex"></div>

      </div>
    </div>
  </div>
</body>

</html>
