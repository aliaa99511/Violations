<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>المخالفات قيد السداد</title>
</head>

<body>

    <div class="pendingPaymentRecords" id="pendingPaymentRecordsContainer">
        <div id="identify" page-name="PendingPaymentRecordsLog" site-name="ViolationsRecorder" hidden></div>
        <div class="mainContainer">
            <div class="contentContainer">
                <div class="filterBox blueFilterBox">
                    <div class="row">
                        <!-- Removed violationSector column -->
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="violationCategory" class="customLabel blueLabel">تصنيف المخالفة
                                </label>
                                <div class="selectBox smallSelectBox">
                                    <select class="form-control violationCategory" id="violationCategory">
                                        <option value="" disabled selected hidden>الكل</option>
                                    </select>
                                    <i class="fa-solid fa-sort-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="TypeofViolation" class="customLabel blueLabel">نوع المخالفة
                                </label>
                                <div class="selectBox smallSelectBox">
                                    <select class="form-control TypeofViolation blueSelect" id="TypeofViolation">
                                        <option data-id="0" value="0" disabled selected hidden>
                                            الكل
                                        </option>
                                    </select>
                                    <i class="fa-solid fa-sort-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="violationSearch" class="customLabel blueLabel">بحث...</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="violationSearch" type="text" class="form-control" placeholder="البحث" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="createdFrom" class="customLabel blueLabel">من</label>
                                <div class="inputIconBox">
                                    <input class="form-control customInput inputDate createdFrom" id="createdFrom"
                                        type="text" placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>

                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="createdTo" class="customLabel blueLabel">إلى
                                </label>
                                <div class="inputIconBox">
                                    <input id="createdTo" type="text"
                                        class="form-control customInput inputDate createdTo" placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-1 FilterationBtnsBox">
                            <div class="buttonsBox pt-3">
                                <div class="btnStyle resetBtn resetBlueBtn">
                                    <i class="fa-solid fa-rotate-left"></i>
                                </div>
                                <div class="btnStyle searchBtn searchBlueBtn" type="button">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </div>

                                <div class="btnStyle printBtn">
                                    طباعة التقرير
                                    <i class="fa-solid fa-print"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dashBoardTable">
                    <div class="btnContainer">
                        <!-- Column Selector -->
                        <div class="columnSelectorWrapper">
                            <button type="button" id="columnToggleBtn" class="outlineBlueBtn selectColumnBtn">
                                تحديد الأعمدة
                                <i class="fa-solid fa-grip-lines-vertical"></i>
                            </button>
                            <div id="columnSelector" class="columnDropdown"></div>
                        </div>
                        <!-- Export Button -->
                        <div id="exportBtn" class="outlineBlueBtn exportBtn">
                            تصدير
                            <i class="fa-solid fa-download"></i>
                        </div>
                    </div>
                    <table id="PendingPaymentRecords" class="table tableWithIcons blueTable"></table>
                </div>

                <div id="paginationID" class="paginationBox" current="" total="" style="display: flex"></div>
            </div>
        </div>
    </div>
</body>

</html>
