<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سجلات إحالات مخالفات المركبات - قطاع</title>
</head>

<body>
    <div class="vehicleViolationReferralSector" id="vehicleViolationReferralSector">
        <div id="identify" page-name="VehicleViolationReferralSector" site-name="CertificationOfficer" hidden></div>
        <div class="mainContainer">
            <div class="contentContainer">
                <div class="filterBox greenFilterBox">
                    <div class="row">
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="vehicleRegistrationNumber" class="customLabel greenLabel">رقم القيد</label>
                                <input class="form-control customInput vehicleRegistrationNumber"
                                    id="vehicleRegistrationNumber" type="text" placeholder="ادخل رقم القيد" />
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="CaseStatus" class="customLabel greenLabel">موقف الإحالة</label>
                                <div class="selectBox smallSelectBox">
                                    <select class="form-control CaseStatus greenSelect" id="CaseStatus">
                                        <option value="" disabled selected hidden>الكل</option>
                                    </select>
                                    <i class="fa-solid fa-sort-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="violationCode" class="customLabel greenLabel">رقم المخالفة</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="violationCode" type="text" class="form-control"
                                        placeholder="ادخل رقم المخالفة" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="theCode" class="customLabel greenLabel">رقم العربة</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="theCode" type="text" class="form-control" placeholder="ادخل الرقم" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="ViolationStatus" class="customLabel greenLabel">حالة المخالفة</label>
                                <div class="selectBox smallSelectBox">
                                    <select class="form-control ViolationStatus greenSelect" id="ViolationStatus">
                                        <option value="" disabled selected hidden>الكل</option>
                                    </select>
                                    <i class="fa-solid fa-sort-down"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="CourtCaseNumber" class="customLabel greenLabel">الرقم القضائي</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="CourtCaseNumber" type="text" class="form-control"
                                        placeholder="ادخل الرقم القضائي" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="TrafficName" class="customLabel greenLabel">اسم السائق</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="TrafficName" type="text" class="form-control"
                                        placeholder="ادخل اسم السائق" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4">
                            <div class="form-group customFormGroup">
                                <label for="ViolatorCompany" class="customLabel greenLabel">اسم الشركة</label>
                                <div class="selectBox smallSelectBox">
                                    <input id="ViolatorCompany" type="text" class="form-control"
                                        placeholder="ادخل اسم الشركة" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="refferedDateFrom" class="customLabel greenLabel">من</label>
                                <div class="inputIconBox">
                                    <input class="form-control customInput inputDate" id="RefferedDateFrom" type="text"
                                        placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>

                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="refferedDateTo" class="customLabel greenLabel">إلى
                                </label>
                                <div class="inputIconBox">
                                    <input id="RefferedDateTo" type="text" class="form-control customInput inputDate"
                                        placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-4 FilterationBtnsBox">
                            <div class="buttonsBox pt-3">
                                <div class="btnStyle resetBtn resetGreenBtn">
                                    <i class="fa-solid fa-rotate-left"></i>
                                </div>
                                <div class="btnStyle searchBtn searchGreenBtn">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </div>
                                <div class="btnStyle printBtn">
                                    طباعة التقرير
                                    <i class="fa-solid fa-print"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dashBoardTable">
                    <div class="btnContainer">
                        <div id="exportBtn" class="outlineGreenBtn exportBtn">
                            تصدير
                            <i class="fa-solid fa-download"></i>
                        </div>
                    </div>
                    <table id="VehicleViolationReferralSectorTable" class="table tableWithIcons greenTable"></table>
                </div>

                <div id="paginationIDRecords" class="paginationBox" current="" total="" style="display: flex"></div>
            </div>
        </div>
    </div>
</body>

</html>
