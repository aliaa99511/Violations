<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
</head>

<body>
    <div class="ExternalViolationLog" id="ExternalViolationLogContainer">
        <div id="identify" page-name="ExternalViolationLog" site-name="ViolationsBranch" hidden></div>
        <div class="mainContainer">
            <div class="contentContainer">
                <div class="filterBox greenFilterBox">
                    <div class="row">
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="violationCode" class="customLabel greenLabel">رقم المخالفة
                                </label>
                                <div class="selectBox smallSelectBox">
                                    <input id="violationCode" type="text" class="form-control"
                                        placeholder="ادخل رقم المخالفة" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="caseNumber" class="customLabel greenLabel">رقم القضية
                                </label>
                                <div class="selectBox smallSelectBox">
                                    <input id="caseNumber" type="text" class="form-control"
                                        placeholder="ادخل رقم القضية" />
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="createdFrom" class="customLabel greenLabel">من</label>
                                <div class="inputIconBox">
                                    <input class="form-control customInput inputDate createdFrom" id="createdFrom"
                                        type="text" placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>

                        <div class="col-6 col-md-3">
                            <div class="form-group customFormGroup">
                                <label for="createdTo" class="customLabel greenLabel">إلى
                                </label>
                                <div class="inputIconBox">
                                    <input id="createdTo" type="text"
                                        class="form-control customInput inputDate createdTo" placeholder="DD-MM-YYYY" />
                                    <i class="fa-solid fa-calendar-days"></i>
                                </div>
                            </div>
                        </div>
                        <div class="col-6 col-md-1 FilterationBtnsBox">
                            <div class="buttonsBox pt-3">
                                <div class="btnStyle resetBtn resetGreenBtn">
                                    <i class="fa-solid fa-rotate-left"></i>
                                </div>
                                <div class="btnStyle searchBtn searchGreenBtn">
                                    <i class="fa-solid fa-magnifying-glass"></i>
                                </div>

                                <div class="btnStyle printBtn">
                                    طباعة التقرير
                                    <i class="fa-solid fa-print"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="dashBoardTable">
                    <div class="btnContainer">
                        <!-- Column Selector -->
                        <div class="columnSelectorWrapper">
                            <button type="button" id="columnToggleBtn" class="outlineGreenBtn selectColumnBtn">
                                تحديد الأعمدة
                                <i class="fa-solid fa-grip-lines-vertical"></i>
                            </button>
                            <div id="columnSelector" class="columnDropdown"></div>
                        </div>
                        <!-- Export Button -->
                        <div id="exportBtn" class="outlineGreenBtn exportBtn">
                            <span class="btn-text">تصدير</span>
                            <i class="fa-solid fa-download"></i>
                            <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"
                                style="display: none;"></span>
                        </div>
                    </div>
                    <table id="ExternalViolationLog" class="table tableWithIcons greenTable"></table>
                </div>

                <div id="paginationID" class="paginationBox" current="" total="" style="display: flex"></div>
            </div>
        </div>
    </div>
</body>

</html>
